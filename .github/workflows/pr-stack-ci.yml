name: PR Stack CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shared stack smoke command
        shell: pwsh
        run: ./scripts/run-stack-tests.ps1 -Action test
